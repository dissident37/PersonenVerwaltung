services:

  db:
    image: postgres:16
    container_name: personenverwaltung-db
    environment:
      POSTGRES_DB: personenverwaltung
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d personenverwaltung"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: PersonenVerwaltung.API/Dockerfile
    container_name: personenverwaltung-api
    environment:
      DATABASE_URL: "Host=db;Database=personenverwaltung;Username=postgres;Password=postgres"
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: PersonenVerwaltung.UI/Dockerfile
    container_name: personenverwaltung-ui
    environment:
      API_URL: "http://api:8080"
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "8081:8081"
    depends_on:
      - api

  adminer:
    image: adminer
    container_name: personenverwaltung-adminer
    ports:
      - "8082:8080"
    depends_on:
      - db

volumes:
  postgres_data:
