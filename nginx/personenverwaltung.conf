# Reverse-Proxy fuer PersonenVerwaltung
# HTTPS via Let's Encrypt (Certbot)

# UI: personen.konstantinsittner.de -> Port 8081
server {
    server_name personen.konstantinsittner.de;

    location / {
        proxy_pass         http://localhost:8081;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/personen.konstantinsittner.de/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/personen.konstantinsittner.de/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# API: personen-api.konstantinsittner.de -> Port 8080
server {
    server_name personen-api.konstantinsittner.de;

    location / {
        proxy_pass         http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/personen.konstantinsittner.de/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/personen.konstantinsittner.de/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# HTTP -> HTTPS Weiterleitung
server {
    if ($host = personen.konstantinsittner.de) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name personen.konstantinsittner.de;
    return 404; # managed by Certbot
}

server {
    if ($host = personen-api.konstantinsittner.de) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name personen-api.konstantinsittner.de;
    return 404; # managed by Certbot
}
